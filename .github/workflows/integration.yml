name: Minimal Integration Test

on: [push, pull_request]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Docker Compose (Docker official repo, Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          sudo chmod a+r /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          docker compose version

      - name: Start cluster
        run: |
          docker compose up -d
          sleep 5
          docker ps

      - name: Create test file
        run: echo "hello frost" > sample.txt

      - name: "Run client: stamp"
        run: ./client stamp sample.txt http://localhost:8081

      - name: "Run client: verify"
        run: ./client verify sample.txt sample.txt.receipt.json

      - name: Teardown
        if: always()
        run: docker compose down
